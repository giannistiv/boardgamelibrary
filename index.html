function computeAchievements(playerName) {
  const plays = [];
  for (const bggId in PLAY_HISTORY) {
    for (const p of PLAY_HISTORY[bggId]) {
      if (!p || !p.date || !Array.isArray(p.sc)) continue;
      const me = p.sc.find(s => s.n === playerName);
      if (!me) continue;
      plays.push({ date: p.date, bggId: Number(bggId), sc: p.sc, me, location: p.l });
    }
  }
  plays.sort((a, b) => a.date.localeCompare(b.date));

  const earned = {};
  const mark = (id, date) => { if (!earned[id]) earned[id] = date; };

  let totalPlays = 0, totalWins = 0;
  let coopWins = 0, soloPlays = 0;
  let lightWins = 0, heavyWins = 0;
  let curStreak = 0, curLossStreak = 0;
  const gamesPlayed = new Set();
  const opponents = new Set();
  const locations = new Set();
  const categories = new Set();
  const perGameWR = {}; // bggId -> {plays, wins}
  const playsByDate = {}; // date -> count

  for (const p of plays) {
    totalPlays++;
    gamesPlayed.add(p.bggId);
    if (p.location) locations.add(p.location);
    playsByDate[p.date] = (playsByDate[p.date] || 0) + 1;

    for (const s of p.sc) {
      if (s && s.n && s.n !== playerName) opponents.add(s.n);
    }

    const game = findGameByBggId(p.bggId);
    if (game && Array.isArray(game.categories)) {
      for (const c of game.categories) categories.add(c);
    }

    const meWon = !!p.me.w;
    const isSolo = p.sc.length === 1;
    const allSame = p.sc.every(s => !!s.w === !!p.sc[0].w);
    const isCoop = !isSolo && allSame;

    if (meWon) totalWins++;
    if (isSolo) soloPlays++;
    if (isCoop && meWon) coopWins++;

    if (!perGameWR[p.bggId]) perGameWR[p.bggId] = { plays: 0, wins: 0 };
    perGameWR[p.bggId].plays++;
    if (meWon) perGameWR[p.bggId].wins++;

    // Competitive plays drive streaks
    if (!isCoop && !isSolo) {
      if (meWon) {
        if (curLossStreak >= 5) mark('comeback-kid', p.date);
        curStreak++;
        curLossStreak = 0;
        if (curStreak >= 3)  mark('hot-streak', p.date);
        if (curStreak >= 5)  mark('on-fire',    p.date);
        if (curStreak >= 10) mark('inferno',    p.date);
      } else {
        curStreak = 0;
        curLossStreak++;
      }
    }

    if (meWon && game && typeof game.complexity === 'number') {
      if (game.complexity >= 4)   mark('heavy-hitter', p.date);
      if (game.complexity >= 4.5) mark('brain-burner', p.date);
      if (game.complexity >= 3)              heavyWins++;
      if (game.complexity > 0 && game.complexity <= 1.5) lightWins++;
    }

    if (totalWins === 1)             mark('first-win',        p.date);
    if (totalPlays === 10)           mark('graduated',        p.date);
    if (totalPlays === 100)          mark('centurion',        p.date);
    if (totalPlays === 500)          mark('half-grand',       p.date);
    if (gamesPlayed.size === 25)     mark('diversifier',      p.date);
    if (opponents.size === 25)       mark('social-butterfly', p.date);
    if (locations.size === 5)        mark('globetrotter',     p.date);
    if (categories.size === 8)       mark('explorer',         p.date);
    if (playsByDate[p.date] === 5)   mark('marathon',         p.date);
    if (lightWins === 10)            mark('speed-demon',      p.date);
    if (heavyWins === 10)            mark('heavy-lifter',     p.date);
    if (coopWins === 10)             mark('coop-captain',     p.date);
    if (soloPlays === 10)            mark('solo-adventurer',  p.date);

    if (!earned['perfectionist']) {
      for (const bggId in perGameWR) {
        const r = perGameWR[bggId];
        if (r.plays >= 5 && r.plays === r.wins) { mark('perfectionist', p.date); break; }
      }
    }
  }
  return earned;
}

function buildAchievementsHtml(playerName) {
  const earned = computeAchievements(playerName);
  const today = new Date().toISOString().slice(0, 10);
  const sevenAgo = new Date(Date.now() - 7 * 86400 * 1000).toISOString().slice(0, 10);

  const all = ACHIEVEMENTS.map(a => ({ ...a, earnedDate: earned[a.id] || null }));
  const recent = all.filter(a => a.earnedDate && a.earnedDate >= sevenAgo)
                    .sort((a, b) => b.earnedDate.localeCompare(a.earnedDate));
  const earnedCount = all.filter(a => a.earnedDate).length;

  const card = (a) => {
    const e = a.earnedDate;
    const tip = e ? `${a.desc} · earned ${e}` : a.desc;
    const bottom = e
      ? `<div class="ach-date">Earned ${_fmtDateShort(e)}</div>`
      : `<div class="ach-desc">${a.desc}</div>`;
    return `<div class="ach-card${e ? '' : ' locked'}" title="${tip}">
      <div class="ach-icon" style="-webkit-mask-image:url(${_achievementIcon(a.id)});mask-image:url(${_achievementIcon(a.id)})"></div>
      <div class="ach-name">${a.name}</div>
      ${bottom}
    </div>`;
  };

  const recentHtml = recent.length > 0 ? `<div class="stats-section ach-recent">
    <div class="stats-section-title">🎉 Recently Earned</div>
    <div class="ach-grid">${recent.map(card).join('')}</div>
  </div>` : '';

  const allHtml = `<div class="stats-section">
    <div class="stats-section-title">Achievements (${earnedCount}/${ACHIEVEMENTS.length})</div>
    <div class="ach-grid">${all.map(card).join('')}</div>
    <div class="ach-credit">Icons by <a href="https://game-icons.net" target="_blank" rel="noopener">game-icons.net</a> (CC BY 3.0)</div>
  </div>`;

  return { recentHtml, allHtml };
}

// ── Stats Dashboard ──
let _viewingProfile = null; // null = own profile, string = visiting someone
let _statsViewSource = null; // 'leaderboard' | 'insights' | null — where the visit was triggered from

function _goBackFromProfile() {
  const src = _statsViewSource;
  _statsViewSource = null;
  _viewingProfile = null;
  if (src === 'leaderboard') switchToLeaderboard();
  else if (src === 'insights') switchToInsights();
  else switchToLibrary();
}
window._goBackFromProfile = _goBackFromProfile;

function showStatsView(playerName, visiting) {
  const loggedInPlayer = localStorage.getItem('bgl-player');
  const isOwnProfile = !visiting || visiting === loggedInPlayer;
  _viewingProfile = isOwnProfile ? null : playerName;

  if (visiting && !isOwnProfile) {
    if (!_statsViewSource) {
      const lbOpen = document.getElementById('leaderboard-view').classList.contains('open');
      const insOpen = document.getElementById('insights-view').classList.contains('open');
      if (lbOpen) _statsViewSource = 'leaderboard';
      else if (insOpen) _statsViewSource = 'insights';
    }
  } else {
    _statsViewSource = null;
  }

  _deactivateAllTabs();
  document.getElementById('stats-view').classList.add('open');
  document.getElementById('btn-mystats').classList.add('active');
  if (_isTouchDevice()) {
    document.body.style.minWidth = 'auto';
    _setViewport(VP_LOCKED);
    window.scrollTo(0, 0);
  }

  // Gather all play data for this player
  const gameStats = {};
  const recentPlays = [];

  for (const bggId in PLAY_HISTORY) {
    const game = GAMES.find(g => g.bggId === Number(bggId))
      || EXTRA_GAMES[bggId]
      || {id:'bgg_'+bggId, name:'Game #'+bggId, bggId:Number(bggId), spineColor:'#555', categories:[], players:'', playTime:'', complexity:0};

    for (const play of PLAY_HISTORY[bggId]) {
      const playerEntry = play.sc.find(s => s.n === playerName);
      if (!playerEntry) continue;

      if (!gameStats[bggId]) {
        gameStats[bggId] = { game, plays: 0, wins: 0, lastPlayed: '' };
      }
      gameStats[bggId].plays++;
      if (playerEntry.w) gameStats[bggId].wins++;
      if (play.date > gameStats[bggId].lastPlayed) gameStats[bggId].lastPlayed = play.date;

      const hasWinner = play.sc.some(s => s.w);
      recentPlays.push({
        game,
        date: play.date,
        won: playerEntry.w,
        noWinner: !hasWinner,
        score: playerEntry.s,
        role: playerEntry.r || '',
        board: play.b || '',
        location: play.l || '',
        allScores: play.sc,
        players: play.sc.length
      });
    }
  }

  recentPlays.sort((a, b) => b.date.localeCompare(a.date));

  const totalPlays = recentPlays.length;
  const totalWins = recentPlays.filter(p => p.won).length;
  // Coop play = 2+ participants where every winner flag is the same (everyone won
  // together OR everyone lost together). A coop *win* is the all-won subset.
  // Plays with mixed flags (some won, some lost) are competitive (incl. team games).
  const coopPlays = recentPlays.filter(p => {
    if (!p.allScores || p.allScores.length < 2) return false;
    const first = !!p.allScores[0].w;
    return p.allScores.every(s => !!s.w === first);
  });
  const coopWins = coopPlays.filter(p => p.won).length;
  const winRate = totalPlays > 0 ? Math.round(totalWins / totalPlays * 100) : 0;
  const uniqueGames = Object.keys(gameStats).length;
  const uniquePlayers = (() => {
    const set = new Set();
    for (const p of recentPlays) {
      for (const s of p.allScores) {
        if (s && s.n && s.n !== playerName) set.add(s.n);
      }
    }
    return set.size;
  })();

  const fmtDate = (d) => {
    const [y, m, day] = d.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
  };

  // Top games by plays
  const topGames = Object.values(gameStats).sort((a, b) => b.plays - a.plays).slice(0, 10);

  // Best win rates (min 3 plays)
  const bestWR = Object.values(gameStats)
    .filter(g => g.plays >= 3)
    .map(g => ({ ...g, wr: Math.round(g.wins / g.plays * 100) }))
    .sort((a, b) => b.wr - a.wr || b.plays - a.plays)
    .slice(0, 8);

  // Recommendations: games they haven't played, sorted by rating
  const playedBggIds = new Set(Object.keys(gameStats).map(Number));
  const recommendations = GAMES
    .filter(g => !playedBggIds.has(g.bggId) && g.bggRating && g.bggRating > 0 && !isExpansion(g))
    .sort((a, b) => (b.bggRating || 0) - (a.bggRating || 0))
    .slice(0, 6);

  const wrColor = (wr) => {
    if (wr >= 70) return '#22c55e';
    if (wr >= 50) return '#a3e635';
    if (wr >= 35) return '#e2b04a';
    return '#f87171';
  };

  const gameRowHtml = (gs) => {
    const wr = gs.plays > 0 ? Math.round(gs.wins / gs.plays * 100) : 0;
    const imgSrc = gs.game.bggId > 0 ? `images/${gs.game.bggId}.jpg` : '';
    return `<div class="stats-game-row" data-bgg-id="${gs.game.bggId}">
      ${imgSrc ? `<img class="stats-game-img" src="${imgSrc}" alt="" onerror="__imgFallback(this, ${gs.game.bggId})">` : ''}
      <div class="stats-game-info">
        <div class="stats-game-name">${gs.game.name}</div>
        <div class="stats-game-detail">${gs.plays} play${gs.plays !== 1 ? 's' : ''} &middot; ${gs.wins} win${gs.wins !== 1 ? 's' : ''} &middot; Last: ${fmtDate(gs.lastPlayed)}</div>
      </div>
      <div class="stats-game-wr" style="color:${wrColor(wr)}">${wr}%</div>
    </div>`;
  };

  const backBtnHtml = (!isOwnProfile && _statsViewSource)
    ? `<button class="profile-back-btn" onclick="_goBackFromProfile()">← Back to ${_statsViewSource === 'leaderboard' ? 'Leaderboard' : 'Stats'}</button>`
    : '';

  // Head-to-head when viewing someone else's profile
  let h2hHtml = '';
  if (!isOwnProfile && loggedInPlayer && loggedInPlayer !== playerName) {
    const h2hPlays = [];
    for (const bggId in PLAY_HISTORY) {
      for (const play of PLAY_HISTORY[bggId]) {
        if (!play || !Array.isArray(play.sc)) continue;
        const me = play.sc.find(s => s.n === loggedInPlayer);
        const them = play.sc.find(s => s.n === playerName);
        if (!me || !them) continue;
        h2hPlays.push({ date: play.date, sc: play.sc });
      }
    }
    h2hPlays.sort((a, b) => a.date.localeCompare(b.date));

    let myWins = 0, theirWins = 0, ties = 0;
    let curMyStreak = 0, longestMyStreak = 0;
    let curTheirStreak = 0, longestTheirStreak = 0;
    let lastResult = '', lastDate = '';
    for (const p of h2hPlays) {
      const me = p.sc.find(s => s.n === loggedInPlayer);
      const them = p.sc.find(s => s.n === playerName);
      const allSame = p.sc.every(s => !!s.w === !!p.sc[0].w);
      if (allSame) continue; // coop / all-lost
      const meW = !!me.w, themW = !!them.w;
      if (meW && !themW) {
        myWins++;
        curMyStreak++;
        curTheirStreak = 0;
        longestMyStreak = Math.max(longestMyStreak, curMyStreak);
        lastResult = 'You won';
      } else if (themW && !meW) {
        theirWins++;
        curTheirStreak++;
        curMyStreak = 0;
        longestTheirStreak = Math.max(longestTheirStreak, curTheirStreak);
        lastResult = `${playerName} won`;
      } else if (meW && themW) {
        ties++;
        curMyStreak = 0;
        curTheirStreak = 0;
        lastResult = 'Tied';
      } else {
        curMyStreak = 0;
        curTheirStreak = 0;
        lastResult = 'Both lost';
      }
      lastDate = p.date;
    }

    const decisive = myWins + theirWins + ties;
    if (decisive > 0) {
      const shortName = playerName.split(' ')[0];
      const streakLine = (longestMyStreak >= 2 || longestTheirStreak >= 2)
        ? ` · best streaks: you ${longestMyStreak} · ${shortName} ${longestTheirStreak}`
        : '';
      h2hHtml = `<div class="stats-section h2h-section">
        <div class="stats-section-title">You vs ${playerName}</div>
        <div class="h2h-grid">
          <div class="h2h-card"><div class="h2h-val" style="color:#22c55e">${myWins}</div><div class="h2h-label">You</div></div>
          <div class="h2h-card"><div class="h2h-val">${ties}</div><div class="h2h-label">Tied</div></div>
          <div class="h2h-card"><div class="h2h-val" style="color:#f87171">${theirWins}</div><div class="h2h-label">${shortName}</div></div>
        </div>
        <div class="h2h-meta">${decisive} head-to-head play${decisive !== 1 ? 's' : ''}${streakLine}${lastDate ? ` · last: ${lastResult} on ${fmtDate(lastDate)}` : ''}</div>
      </div>`;
    }
  }

  // Build favorites section
  const favoritesHtml = buildFavoritesHtml(playerName, isOwnProfile);

  // Build achievements (recent at top, full list at bottom)
  const { recentHtml: achRecentHtml, allHtml: achAllHtml } = buildAchievementsHtml(playerName);

  // Build day/location charts for this player
  const playerDays = {};
  const playerLocs = {};
  for (const p of recentPlays) {
    const [y, m, d] = p.date.split('-').map(Number);
    const dow = new Date(y, m - 1, d).getDay();
    const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dow];
    playerDays[dayName] = (playerDays[dayName] || 0) + 1;
    const loc = p.location || '';
    if (loc) playerLocs[loc] = (playerLocs[loc] || 0) + 1;
  }
  const chartsHtml = buildChartsHtml(playerDays, playerLocs, totalPlays);

  const container = document.getElementById('stats-view');
  container.innerHTML = `
    ${backBtnHtml}
    <div class="stats-header">
      <div class="stats-player-name">${playerName}</div>
      <div class="stats-player-sub">${isOwnProfile ? 'Your Profile' : 'Player Profile'}</div>
    </div>

    ${achRecentHtml}

    ${favoritesHtml}

    ${h2hHtml}

    <div class="stats-grid">
      <div class="stats-card">
        <div class="stats-card-val">${totalPlays}</div>
        <div class="stats-card-label">Total Plays</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-val">${totalWins}</div>
        <div class="stats-card-label">Total Wins</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-val" style="color:${wrColor(winRate)}">${winRate}%</div>
        <div class="stats-card-label">Win Rate</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-val">${coopWins}<span style="font-size:0.55em;opacity:0.55">/${coopPlays.length}</span></div>
        <div class="stats-card-label">Coop Wins</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-val">${uniqueGames}</div>
        <div class="stats-card-label">Unique Games</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-val">${uniquePlayers}</div>
        <div class="stats-card-label">Different Players</div>
      </div>
    </div>

    <div class="stats-section">
      <div class="stats-section-title">${isOwnProfile ? 'Most Played' : 'Most Played'}</div>
      ${topGames.map(gameRowHtml).join('')}
    </div>

    ${bestWR.length > 0 ? `<div class="stats-section">
      <div class="stats-section-title">Best Win Rates (3+ plays)</div>
      ${bestWR.map(gameRowHtml).join('')}
    </div>` : ''}

    ${chartsHtml}

    ${isOwnProfile && recommendations.length > 0 ? `<div class="stats-section">
      <div class="stats-section-title">Recommended for You</div>
      <div class="stats-player-sub" style="margin:-0.3rem 0 0.6rem">Top-rated games from the shelf you haven't tried yet</div>
      ${recommendations.map(g => {
        const imgSrc = g.bggId > 0 ? `images/${g.bggId}.jpg` : '';
        return `<div class="stats-rec-row" data-bgg-id="${g.bggId}">
          ${imgSrc ? `<img class="stats-game-img" src="${imgSrc}" alt="" onerror="__imgFallback(this, ${g.bggId})">` : ''}
          <div class="stats-game-info">
            <div class="stats-game-name">${g.name}</div>
            <div class="stats-game-detail">${g.players} players &middot; ${g.playTime} &middot; ${g.complexity}/5 weight</div>
          </div>
          <div class="stats-game-wr" style="color:${wrColor(Math.round((g.bggRating/10)*100))}">${g.bggRating}</div>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${achAllHtml}

    <div class="qr-section">
      <div class="stats-section-title" style="border:none;text-align:center">Share This Library</div>
      <div class="qr-canvas"><img id="qr-img" width="150" height="150" alt="QR Code" style="border-radius:8px"></div>
      <div class="qr-label">Scan to open on your phone</div>
    </div>

    <!-- ── JSON Import (Στιβ only) ── -->
  ${playerName === 'Στιβ' ? `<div class="import-section" id="importSection">
    <div class="import-section-title">📥 Import BGStats Play File</div>
    <div class="import-drop-zone" id="importDropZone">
      <input type="file" id="importFileInput" accept=".json,.bgsplay">
      <div class="import-drop-icon">📂</div>
      <div class="import-drop-label">Drop your BGStats Play export here</div>
      <div class="import-drop-sub">or click to browse — new plays, players & games will be merged</div>
    </div>
    <div class="import-result" id="importResult">
      <div class="import-result-title" id="importResultTitle"></div>
      <div class="import-result-lines" id="importResultLines"></div>
    </div>
  </div>` : ''}

    ${isOwnProfile ? '<button class="change-profile-btn" id="btn-change-profile">Change Profile</button>' : ''}
  `;

  // Wire up importer for Στιβ
  if (playerName === 'Στιβ' && typeof window.initImporter === 'function') {
    window.initImporter();
  }

  // Make game rows clickable
  container.querySelectorAll('[data-bgg-id]').forEach(el => {
    el.addEventListener('click', () => {
      const game = findGameByBggId(el.dataset.bggId);
      if (game) openModal(game);
    });
  });

  // Wire favorites grid
  wireFavoritesGrid(container, playerName, isOwnProfile);

  // Refresh favorites from Firebase for cross-device sync
  if (FIREBASE_DB) {
    fetch(`${FIREBASE_DB}/favorites/${encodeURIComponent(playerName)}.json`)
      .then(r => r.json())
      .then(data => {
        if (!data) data = [];
        if (!Array.isArray(data)) return;
        const current = getPlayerFavorites(playerName);
        if (JSON.stringify(current) === JSON.stringify(data)) return;
        favoritesCache[playerName] = data;
        _saveFavoritesToLocal();
        const section = container.querySelector('.favorites-section');
        const newHtml = buildFavoritesHtml(playerName, isOwnProfile);
        if (section) {
          section.outerHTML = newHtml;
        } else if (newHtml) {
          const header = container.querySelector('.stats-header');
          if (header) header.insertAdjacentHTML('afterend', newHtml);
        }
        wireFavoritesGrid(container, playerName, isOwnProfile);
      })
      .catch(() => {});
  }

  // Change profile button
  const changeBtn = document.getElementById('btn-change-profile');
  if (changeBtn) {
    changeBtn.addEventListener('click', () => {
      localStorage.removeItem('bgl-player');
      openPicker();
    });
  }

  // Generate QR code via API
  const qrImg = document.getElementById('qr-img');
  if (qrImg) {
    const url = encodeURIComponent(window.location.href.split('?')[0].split('#')[0]);
    qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${url}`;
  }
}

// ── Rating System (Firebase Realtime Database) ──
// PASTE YOUR FIREBASE REALTIME DATABASE URL BELOW:
const FIREBASE_DB = 'https://boardgamelibrary0-default-rtdb.europe-west1.firebasedatabase.app';

// In-memory cache of all ratings: { bggId: { playerName: {value, updatedAt} } }
// Legacy shape was { bggId: { playerName: number } } — migrated on load.
let ratingsCache = {};
let ratingsCacheReady = false;

async function loadAllRatings() {
  if (!FIREBASE_DB) { ratingsCacheReady = true; return; }
  try {
    const res = await fetch(`${FIREBASE_DB}/ratings.json`);
    const data = await res.json();
    ratingsCache = data || {};
    const migrations = [];
    for (const bggId in ratingsCache) {
      for (const player in ratingsCache[bggId]) {
        const v = ratingsCache[bggId][player];
        if (typeof v === 'number') {
          const obj = { value: v, updatedAt: 0 };
          ratingsCache[bggId][player] = obj;
          migrations.push(
            fetch(`${FIREBASE_DB}/ratings/${bggId}/${encodeURIComponent(player)}.json`, {
              method: 'PUT',
              body: JSON.stringify(obj)
            }).catch(() => {})
          );
        }
      }
    }
    if (migrations.length) await Promise.all(migrations);
    ratingsCacheReady = true;
  } catch (e) {
    console.warn('Failed to load ratings from Firebase:', e);
    ratingsCacheReady = true;
  }
}

async function saveRating(playerName, bggId, rating) {
  if (!ratingsCache[bggId]) ratingsCache[bggId] = {};
  if (rating === 0) {
    delete ratingsCache[bggId][playerName];
    if (Object.keys(ratingsCache[bggId]).length === 0) delete ratingsCache[bggId];
  } else {
    ratingsCache[bggId][playerName] = { value: rating, updatedAt: Date.now() };
  }

  if (!FIREBASE_DB) return;
  try {
    if (rating === 0) {
      await fetch(`${FIREBASE_DB}/ratings/${bggId}/${encodeURIComponent(playerName)}.json`, { method: 'DELETE' });
    } else {
      await fetch(`${FIREBASE_DB}/ratings/${bggId}/${encodeURIComponent(playerName)}.json`, {
        method: 'PUT',
        body: JSON.stringify(ratingsCache[bggId][playerName])
      });
    }
  } catch (e) {
    console.warn('Failed to save rating to Firebase:', e);
  }
}

function _ratingValue(r){ return typeof r === 'number' ? r : (r && r.value) || 0; }

// ── Imported plays persistence ──
// Stored in Firebase at /importedPlays/{uuid} = {bggId, date, sc, d?, b?}
// Merged into the in-memory PLAY_HISTORY on startup so new browsers see them.
let importedPlaysCache = {}; // uuid -> play entry (includes bggId)

function _mergePlayIntoHistory(uuid, p) {
  if (!p || !p.bggId || !p.date || !Array.isArray(p.sc)) return;
  const bggId = p.bggId;
  if (!PLAY_HISTORY[bggId]) PLAY_HISTORY[bggId] = [];
  for (const s of p.sc) {
    if (s && s.n && NAME_MAP[s.n]) s.n = NAME_MAP[s.n];
  }
  if (p.l && LOCATION_MAP[p.l]) p.l = LOCATION_MAP[p.l];
  const entry = { date: p.date, sc: p.sc, _uuid: uuid };
  if (p.d) entry.d = p.d;
  if (p.b) entry.b = p.b;
  if (p.l) entry.l = p.l;

  const newNames = new Set(p.sc.map(s => s.n));
  const isHardcodedDup = (e) => {
    if (e._uuid) return false;
    if (e.date !== p.date) return false;
    if (e.sc.length !== p.sc.length) return false;
    let overlap = 0;
    for (const s of e.sc) if (newNames.has(s.n)) overlap++;
    return overlap >= Math.max(1, e.sc.length - 1);
  };

  // 1. Prefer matching the existing entry by uuid across all bggIds
  let placed = false;
  for (const existingBggId in PLAY_HISTORY) {
    const arr = PLAY_HISTORY[existingBggId];
    const uuidIdx = arr.findIndex(e => e._uuid === uuid);
    if (uuidIdx !== -1) {
      if (existingBggId == bggId) {
        arr[uuidIdx] = entry;
      } else {
        arr.splice(uuidIdx, 1);
        PLAY_HISTORY[bggId].push(entry);
        PLAY_HISTORY[bggId].sort((a,b) => b.date.localeCompare(a.date));
      }
      placed = true;
      break;
    }
  }

  // 2. Fall back to hardcoded dedup: same date + same player count + ≥ N-1
  // players overlap (set-based, order-independent) → replace.
  if (!placed) {
    const idx = PLAY_HISTORY[bggId].findIndex(isHardcodedDup);
    if (idx !== -1) {
      PLAY_HISTORY[bggId][idx] = entry;
    } else {
      PLAY_HISTORY[bggId].push(entry);
      PLAY_HISTORY[bggId].sort((a,b) => b.date.localeCompare(a.date));
    }
    return;
  }

  // 3. After uuid match placed the entry, also clean up any leftover
  // hardcoded duplicates of the same play (e.g. old PLAY_HISTORY entry
  // that was imported separately before — now that it has a uuid, its
  // hardcoded twin should go away).
  PLAY_HISTORY[bggId] = PLAY_HISTORY[bggId].filter(e =>
    e._uuid === uuid || !isHardcodedDup(e)
  );
}

async function loadImportedPlays() {
  if (!FIREBASE_DB) return;
  try {
    const res = await fetch(`${FIREBASE_DB}/importedPlays.json`);
    const data = await res.json();
    importedPlaysCache = data || {};
    for (const uuid in importedPlaysCache) {
      _mergePlayIntoHistory(uuid, importedPlaysCache[uuid]);
    }
  } catch (e) {
    console.warn('Failed to load imported plays from Firebase:', e);
  }
}

async function persistImportedPlay(uuid, p) {
  importedPlaysCache[uuid] = p;
  if (!FIREBASE_DB) return;
  try {
    await fetch(`${FIREBASE_DB}/importedPlays/${encodeURIComponent(uuid)}.json`, {
      method: 'PUT',
      body: JSON.stringify(p)
    });
  } catch (e) {
    console.warn('Failed to save imported play to Firebase:', e);
  }
}

function getPlayerRating(playerName, bggId) {
  return _ratingValue(ratingsCache[bggId] && ratingsCache[bggId][playerName]);
}

function getCommunityRating(bggId) {
  const gameRatings = ratingsCache[bggId];
  if (!gameRatings) return null;
  const values = Object.values(gameRatings).map(_ratingValue).filter(v => v > 0);
  if (values.length === 0) return null;
  const avg = values.reduce((a, b) => a + b, 0) / values.length;
  return { avg: Math.round(avg * 10) / 10, count: values.length };
}

function buildStarRatingHtml(bggId) {
  const player = localStorage.getItem('bgl-player');
  const current = player ? getPlayerRating(player, bggId) : 0;

  let html = '<div class="star-rating-section">';

  // Player rating
  if (player) {
    html += `<div class="star-rating-label">${current ? 'Your Rating' : 'Rate this game'}</div>`;
    html += `<div style="display:flex;align-items:center">`;
    html += `<div class="star-rating-row" id="star-row" data-bgg="${bggId}" data-current="${current}">`;
    for (let i = 1; i <= 10; i++) {
      html += `<span class="star${i <= current ? ' filled' : ''}" data-val="${i}">&#9733;</span>`;
    }
    html += `</div>`;
    if (current) html += `<span class="star-rating-val">${current}/10</span>`;
    if (current) html += `<button class="star-rating-clear" data-bgg="${bggId}">clear</button>`;
    html += `</div>`;
  }

  html += '</div>';
  return html;
}

function wireStarRating() {
  const row = document.getElementById('star-row');
  if (!row) return;
  const stars = row.querySelectorAll('.star');
  const bggId = Number(row.dataset.bgg);
  const player = localStorage.getItem('bgl-player');

  // Hover effect
  stars.forEach(star => {
    star.addEventListener('mouseenter', () => {
      const val = Number(star.dataset.val);
      stars.forEach(s => {
        s.classList.toggle('hovered', Number(s.dataset.val) <= val);
      });
    });
  });
  row.addEventListener('mouseleave', () => {
    stars.forEach(s => s.classList.remove('hovered'));
  });

  // Click to rate
  stars.forEach(star => {
    star.addEventListener('click', async () => {
      const val = Number(star.dataset.val);
      if (player) {
        await saveRating(player, bggId, val);
        const section = row.closest('.star-rating-section');
        if (section) {
          section.outerHTML = buildStarRatingHtml(bggId);
          wireStarRating();
        }
      }
    });
  });

  // Clear button
  const clearBtn = document.querySelector('.star-rating-clear');
  if (clearBtn) {
    clearBtn.addEventListener('click', async () => {
      if (player) {
        await saveRating(player, Number(clearBtn.dataset.bgg), 0);
        const section = clearBtn.closest('.star-rating-section');
        if (section) {
          section.outerHTML = buildStarRatingHtml(Number(clearBtn.dataset.bgg));
          wireStarRating();
        }
      }
    });
  }
}

// ── Pie Chart Builder ──
const PIE_COLORS = ['#e2b04a','#4fc3f7','#22c55e','#f87171','#a78bfa','#f59e0b','#ec4899','#14b8a6','#8b5cf6','#6366f1'];

function buildPieHtml(data, total, title, maxVisible) {
  if (!data || Object.keys(data).length === 0) return '';
  const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]);
  let gradParts = [];
  let angle = 0;
  const items = [];
  sorted.forEach(([label, count], i) => {
    const pct = (count / total * 100);
    const color = PIE_COLORS[i % PIE_COLORS.length];
    gradParts.push(`${color} ${angle.toFixed(1)}deg ${(angle + pct * 3.6).toFixed(1)}deg`);
    angle += pct * 3.6;
    items.push({ label, count, pct: Math.round(pct), color });
  });
  const grad = `conic-gradient(${gradParts.join(',')})`;
  const limit = maxVisible && items.length > maxVisible ? maxVisible : items.length;
  const visibleHtml = items.slice(0, limit).map(it =>
    `<div class="pie-legend-item"><span class="pie-legend-dot" style="background:${it.color}"></span>${it.label}<span class="pie-legend-pct">${it.pct}%</span></div>`
  ).join('');
  const hiddenHtml = items.length > limit ? items.slice(limit).map(it =>
    `<div class="pie-legend-item"><span class="pie-legend-dot" style="background:${it.color}"></span>${it.label}<span class="pie-legend-pct">${it.pct}%</span></div>`
  ).join('') : '';
  const showMoreBtn = hiddenHtml ? `<div class="pie-legend-hidden" style="display:none">${hiddenHtml}</div><button class="pie-legend-more" onclick="var h=this.previousElementSibling;h.style.display=h.style.display==='none'?'block':'none';this.textContent=h.style.display==='none'?'Show more':'Show less'">Show more</button>` : '';
  return `<div class="chart-block">
    <div class="chart-block-title">${title}</div>
    <div class="pie-wrap">
      <div class="pie" style="background:${grad}"><div class="pie-center">${total}</div></div>
      <div class="pie-legend">${visibleHtml}${showMoreBtn}</div>
    </div>
  </div>`;
}

function buildChartsHtml(days, locations, total) {
  const dayPie = buildPieHtml(days, total, 'Play Days');
  const locPie = buildPieHtml(locations, total, 'Locations', 5);
  if (!dayPie && !locPie) return '';
  return `<div class="stats-section"><div class="chart-row">${dayPie}${locPie}</div></div>`;
}

function showInsightsView() {
  const container = document.getElementById('insights-view');

  // Overall game stats
  const gamePlayCounts = {};
  const allDays = {};
  const allLocs = {};
  let totalPlays = 0;
  const playerStats = {};

  for (const bggId in PLAY_HISTORY) {
    const game = GAMES.find(g => g.bggId === Number(bggId))
      || EXTRA_GAMES[bggId]
      || {id:'bgg_'+bggId, name:'Game #'+bggId, bggId:Number(bggId), spineColor:'#555', categories:[]};

    for (const play of PLAY_HISTORY[bggId]) {
      totalPlays++;
      if (!gamePlayCounts[bggId]) gamePlayCounts[bggId] = { game, count: 0 };
      gamePlayCounts[bggId].count++;

      const [y, m, d] = play.date.split('-').map(Number);
      const dow = new Date(y, m - 1, d).getDay();
      const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dow];
      allDays[dayName] = (allDays[dayName] || 0) + 1;

      const loc = play.l || '';
      if (loc) allLocs[loc] = (allLocs[loc] || 0) + 1;

      for (const s of play.sc) {
        if (HIDDEN_PLAYERS.has(s.n)) continue;
        if (!playerStats[s.n]) playerStats[s.n] = { plays: 0, wins: 0, games: new Set() };
        playerStats[s.n].plays++;
        if (s.w) playerStats[s.n].wins++;
        playerStats[s.n].games.add(Number(bggId));
      }
    }
  }

  const wrColor = (wr) => {
    if (wr >= 70) return '#22c55e';
    if (wr >= 50) return '#a3e635';
    if (wr >= 35) return '#e2b04a';
    return '#f87171';
  };

  // Top games
  const topGames = Object.values(gamePlayCounts).sort((a, b) => b.count - a.count).slice(0, 15);
  const topGamesHtml = topGames.map(gs => {
    const imgSrc = gs.game.bggId > 0 ? `images/${gs.game.bggId}.jpg` : '';
    return `<div class="stats-game-row" data-bgg-id="${gs.game.bggId}">
      ${imgSrc ? `<img class="stats-game-img" src="${imgSrc}" alt="" onerror="__imgFallback(this, ${gs.game.bggId})">` : ''}
      <div class="stats-game-info">
        <div class="stats-game-name">${gs.game.name}</div>
        <div class="stats-game-detail">${gs.count} play${gs.count !== 1 ? 's' : ''}</div>
      </div>
    </div>`;
  }).join('');

  // Top players
  const topPlayers = Object.entries(playerStats)
    .filter(([, d]) => d.plays >= 2)
    .map(([name, d]) => ({ name, plays: d.plays, wins: d.wins, games: d.games.size, wr: Math.round(d.wins / d.plays * 100) }))
    .sort((a, b) => b.plays - a.plays);

  // Charts
  const chartsHtml = `<div class="stats-section"><div class="chart-row">${buildPieHtml(allDays, totalPlays, 'Play Days')}${buildPieHtml(allLocs, totalPlays, 'Locations', 5)}</div></div>`;

  container.innerHTML = `
    <div class="stats-header">
      <div class="stats-player-name">Stats</div>
      <div class="stats-player-sub">${totalPlays} plays across ${Object.keys(gamePlayCounts).length} games</div>
    </div>

    ${chartsHtml}

    <div class="stats-section">
      <div class="stats-section-title">Most Played Games</div>
      ${topGamesHtml}
    </div>

    <div class="stats-section stats-players-section">
      <div class="stats-section-title">Players</div>
      <input type="text" class="insights-search" id="insights-player-search" placeholder="Search for more..." autocomplete="off">
      <div id="insights-player-list">
        ${_renderInsightsPlayers(topPlayers.slice(0, 10), wrColor)}
      </div>
    </div>
  `;

  // Wire game rows
  container.querySelectorAll('[data-bgg-id]').forEach(el => {
    el.addEventListener('click', () => {
      const game = findGameByBggId(el.dataset.bggId);
      if (game) openModal(game);
    });
  });

  // Wire player search
  const searchEl = document.getElementById('insights-player-search');
  searchEl.addEventListener('input', () => {
    const q = searchEl.value.toLowerCase();
    const filtered = q ? topPlayers.filter(p => p.name.toLowerCase().includes(q)) : topPlayers.slice(0, 10);
    const listEl = document.getElementById('insights-player-list');
    listEl.innerHTML = _renderInsightsPlayers(filtered, wrColor);
    _wireInsightsPlayerClicks(listEl);
  });

  _wireInsightsPlayerClicks(container);
  window.scrollTo(0, 0);
}

function _fmtDateShort(d) {
  const [y, m, day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
}

function _timeAgo(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  const d = Math.floor(s/86400);
  if (d < 30) return d + 'd ago';
  if (d < 365) return Math.floor(d/30) + 'mo ago';
  return Math.floor(d/365) + 'y ago';
}

function _allGames() {
  const seen = new Set();
  const all = [];
  (GAMES || []).forEach(g => { if (g.bggId && !seen.has(g.bggId)) { seen.add(g.bggId); all.push(g); } });
  Object.values(EXTRA_GAMES || {}).forEach(g => { if (g.bggId && !seen.has(g.bggId)) { seen.add(g.bggId); all.push(g); } });
  return all;
}

  const container = document.getElementById('games-view');

  // Global recent plays across all players
  const allPlays = [];
  for (const bggId in PLAY_HISTORY) {
    const game = findGameByBggId(bggId) || { name: 'Game #' + bggId, bggId: Number(bggId) };
    for (const play of PLAY_HISTORY[bggId]) {
      allPlays.push({ game, date: play.date, sc: play.sc, b: play.b || '' });
    }
  }
  allPlays.sort((a, b) => b.date.localeCompare(a.date));

  // Most played recently (last 90 days)
  const cutoff = (() => {
    const d = new Date();
    d.setDate(d.getDate() - 90);
    return d.toISOString().slice(0, 10);
  })();
  const playCounts = {};
  for (const p of allPlays) {
    if (p.date < cutoff) continue;
    const id = p.game.bggId;
    if (!playCounts[id]) playCounts[id] = { game: p.game, count: 0, lastPlayed: '' };
    playCounts[id].count++;
    if (p.date > playCounts[id].lastPlayed) playCounts[id].lastPlayed = p.date;

    </div>`;

      <div id="games-search-results"></div>
    </div>

    ${mostPlayed.length > 0 ? `<div class="stats-section">
      <div class="stats-section-title">Most Played Recently</div>
      <div class="stats-player-sub" style="margin:-0.3rem 0 0.6rem">Last 90 days</div>
      ${mostPlayed.map(gameRowHtml).join('')}

  });

  window.scrollTo(0, 0);
}

// ── Leaderboard (Elo) ──
const AUZTRALIA_BGG_IDS = new Set([231581, 320110]); // base + Tasmania
const GAME_PLAYER_NAME = '__GAME__';

function _leaderboardRanksForPlay(sc, bggId) {
  if (!Array.isArray(sc) || sc.length < 1) return null;
  const isAuztralia = bggId && AUZTRALIA_BGG_IDS.has(Number(bggId));
  const winners = sc.filter(s => s && s.w === true);
  if (winners.length === 0) {
    // AuZtralia: if no human won, the Game wins for Elo purposes
    if (isAuztralia && sc.length >= 1) {
      const ranks = sc.map(s => ({ player: s.n, rank: 2 }));
      ranks.push({ player: GAME_PLAYER_NAME, rank: 1 });
      return ranks;
    }
    return null;
  }
  if (sc.length < 2) return null;
  if (winners.length === sc.length && !isAuztralia) return null; // everyone wins → coop (skip unless AuZtralia)
  // winners.length < sc.length: some won, some lost (including 2+ winners = tie/team)

  const parsed = sc.map(s => {
    if (s.s == null || s.s === '') return null;
    const t = String(s.s).trim();
    if (!t) return null;
    if (/^-?\d+(\.\d+)?$/.test(t)) return Number(t);
    // scores like "16+3+16" → sum
    if (/^[\d.+\-\s]+$/.test(t)) {
      try {
        const v = t.split('+').reduce((a, b) => a + Number(b.trim() || 0), 0);
        return isFinite(v) ? v : null;
      } catch (_) { return null; }
    }
    return null;
  });

  if (parsed.every(v => v !== null)) {
    const wScores = sc.map((s, i) => s.w ? parsed[i] : null).filter(v => v !== null);
    const lScores = sc.map((s, i) => !s.w ? parsed[i] : null).filter(v => v !== null);
    const minW = Math.min(...wScores), maxW = Math.max(...wScores);
    const minL = Math.min(...lScores), maxL = Math.max(...lScores);

    let dir = null;
    if (minW > maxL) dir = 'desc';
    else if (maxW < minL) dir = 'asc';

    if (dir) {
      const indexed = sc.map((s, i) => ({ s, n: parsed[i] }));
      indexed.sort((a, b) => dir === 'desc' ? b.n - a.n : a.n - b.n);
      const out = [];
      let prev = null, rank = 0;
      indexed.forEach((item, i) => {
        if (prev === null || item.n !== prev) { rank = i + 1; prev = item.n; }
        out.push({ player: item.s.n, rank });
      });
      return out;
    }
  }

  // Fallback: winners all at rank 1, losers all at rank 2
  return sc.map(s => ({ player: s.n, rank: s.w ? 1 : 2 }));
}

function _yearStartCutoff() {
  return new Date().getFullYear() + '-01-01';
}

function _computeEloLeaderboard(mode) {
  const yearStart = _yearStartCutoff();
  const flat = [];
  for (const bggId in PLAY_HISTORY) {
    for (const p of PLAY_HISTORY[bggId]) {
      if (!p || !p.date || !Array.isArray(p.sc)) continue;
      if (p.date < yearStart) continue;
      if (mode === 'south' && p.l !== 'Board South') continue;
      flat.push({ bggId: Number(bggId), date: p.date, sc: p.sc });
    }
  }
  flat.sort((a, b) => a.date.localeCompare(b.date));

  const ratings = {};
  const plays = {};
  const lastPlayDate = {};
  const lastDelta = {};
  const firstPlayDate = {};
  const streaks = {}; // current consecutive-win streak per player

  for (const play of flat) {
    const ranks = _leaderboardRanksForPlay(play.sc, play.bggId);
    if (!ranks) continue;

    // Normalize names via NAME_MAP, dedupe duplicate names (keep best rank)
    const byName = {};
    for (const r of ranks) {
      const mapped = NAME_MAP[r.player] || r.player;
      if (!mapped) continue;
      if (byName[mapped] == null || r.rank < byName[mapped]) byName[mapped] = r.rank;
    }
    const participants = Object.keys(byName).map(n => ({ player: n, rank: byName[n] }));
    const N = participants.length;
    if (N < 2) continue;

    const game = findGameByBggId(play.bggId);
    const cx = (game && typeof game.complexity === 'number' && game.complexity > 0) ? game.complexity : 2.5;
    const w = cx / 5;
    const lossMult = Math.min(1, Math.max(0.7, 3 / N));

    for (const m of participants) {
      if (ratings[m.player] == null) ratings[m.player] = 1000;
      if (plays[m.player] == null) plays[m.player] = 0;
    }

    const pre = {}, preCount = {};
    for (const m of participants) {
      pre[m.player] = ratings[m.player];
      preCount[m.player] = plays[m.player];
    }

    const deltas = {};
    for (const m of participants) deltas[m.player] = 0;

    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const a = participants[i], b = participants[j];
        if (a.rank === b.rank) continue;
        const winner = a.rank < b.rank ? a : b;
        const loser  = a.rank < b.rank ? b : a;
        const Rw = pre[winner.player], Rl = pre[loser.player];
        const Ew = 1 / (1 + Math.pow(10, (Rl - Rw) / 400));
        const El = 1 - Ew;
        const Kw = preCount[winner.player] < 5 ? 48 : 32;
        const Kl = preCount[loser.player]  < 5 ? 48 : 32;
        deltas[winner.player] += Kw * w * (1 - Ew);
        deltas[loser.player]  -= Kl * w * El * lossMult;
      }
    }

    for (const m of participants) {
      if (m.player === GAME_PLAYER_NAME) {
        ratings[m.player] = 1000; // pin synthetic Game opponent at base
        continue;
      }
      ratings[m.player] += deltas[m.player];
      plays[m.player]++;
      lastPlayDate[m.player] = play.date;
      if (!firstPlayDate[m.player]) firstPlayDate[m.player] = play.date;
      lastDelta[m.player] = deltas[m.player];
      if (m.rank === 1) {
        streaks[m.player] = (streaks[m.player] || 0) + 1;
      } else {
        streaks[m.player] = 0;
      }
    }
  }

  delete ratings[GAME_PLAYER_NAME];
  return { ratings, plays, lastPlayDate, lastDelta, firstPlayDate, streaks };
}

function _computeRivalryOfYear(mode, forPlayer) {
  const cutoff = _yearStartCutoff();
  const focus = forPlayer ? (NAME_MAP[forPlayer] || forPlayer) : null;

  const pairs = {};
  for (const bggId in PLAY_HISTORY) {
    for (const play of PLAY_HISTORY[bggId]) {
      if (!play || !play.date || play.date < cutoff || !Array.isArray(play.sc)) continue;
      if (mode === 'south' && play.l !== 'Board South') continue;
      const ranks = _leaderboardRanksForPlay(play.sc, bggId);
      if (!ranks) continue;
      const byName = {};
      for (const r of ranks) {
        if (r.player === GAME_PLAYER_NAME) continue;
        const m = NAME_MAP[r.player] || r.player;
        if (!m) continue;
        if (byName[m] == null || r.rank < byName[m]) byName[m] = r.rank;
      }
      const list = Object.entries(byName);
      if (list.length < 2) continue;
      // If we have a focus player, skip plays they weren't in
      if (focus && byName[focus] == null) continue;
      for (let i = 0; i < list.length; i++) {
        for (let j = i + 1; j < list.length; j++) {
          const [n1, r1] = list[i];
          const [n2, r2] = list[j];
          // If focusing on a player, only consider pairs that include them
          if (focus && n1 !== focus && n2 !== focus) continue;
          const [a, b] = n1 < n2 ? [n1, n2] : [n2, n1];
          const aRank = a === n1 ? r1 : r2;
          const bRank = a === n1 ? r2 : r1;
          const key = a + '||' + b;
          if (!pairs[key]) pairs[key] = { a, b, total: 0, aWins: 0, bWins: 0, lastDate: '' };
          pairs[key].total++;
          if (aRank < bRank) pairs[key].aWins++;
          else if (bRank < aRank) pairs[key].bWins++;
          if (play.date > pairs[key].lastDate) pairs[key].lastDate = play.date;
        }
      }
    }
  }

  let best = null;
  for (const k in pairs) {
    const p = pairs[k];
    if (p.total < 2) continue;
    const closeness = Math.abs(p.aWins - p.bWins);
    if (!best) { best = p; continue; }
    const bestCloseness = Math.abs(best.aWins - best.bWins);
    if (p.total > best.total) best = p;
    else if (p.total === best.total && closeness < bestCloseness) best = p;
  }
  return best;
}

function _eloToColorScore(elo) {
  // Map Elo to a 0–10 rating scale used by ratingColor().
  // 850 → 0 (red), 1000 → 5 (yellow), 1150+ → 10 (green).
  return Math.max(0, Math.min(10, (elo - 850) / 30));
}

let _leaderboardMode = 'main'; // 'main' | 'south'

function showLeaderboardView() {
  const container = document.getElementById('leaderboard-view');
  const mode = _leaderboardMode;
  const data = _computeEloLeaderboard(mode);
  const isSouth = mode === 'south';
  const currentYear = new Date().getFullYear();

  const rows = Object.keys(data.ratings)
    .filter(p => data.plays[p] >= 1)
    .map(p => ({
      name: p,
      elo: Math.round(data.ratings[p]),
      plays: data.plays[p],
      lastPlayed: data.lastPlayDate[p],
      lastDelta: data.lastDelta[p] || 0,
      provisional: data.plays[p] < 5,
      streak: data.streaks[p] || 0,
    }))
    .sort((a, b) => b.elo - a.elo);

  const tabsHtml = `
    <div class="lb-tabs">
      <button class="lb-tab ${!isSouth ? 'active' : ''}" data-lb-mode="main">Main</button>
      <button class="lb-tab ${isSouth ? 'active' : ''}" data-lb-mode="south">Board South</button>
    </div>`;
  const titleTxt = isSouth ? `Board South ${currentYear}` : `Leaderboard ${currentYear}`;

  const rawPlayer = localStorage.getItem('bgl-player');
  const focusPlayer = rawPlayer ? (NAME_MAP[rawPlayer] || rawPlayer) : null;
  const rivalry = _computeRivalryOfYear(mode, focusPlayer);
  const rivalryHead = focusPlayer ? '🔥 Your Top Rival' : '🔥 Top Rivalry';
  const rivalryHtml = rivalry ? `
    <div class="lb-rivalry">
      <div class="lb-rivalry-head">${rivalryHead}</div>
      <div class="lb-rivalry-body">
        <span class="lb-rivalry-name" data-visit-player="${rivalry.a.replace(/"/g, '&quot;')}">${rivalry.a}</span>
        <span class="lb-rivalry-score">${rivalry.aWins}–${rivalry.bWins}</span>
        <span class="lb-rivalry-name" data-visit-player="${rivalry.b.replace(/"/g, '&quot;')}">${rivalry.b}</span>
      </div>
      <div class="lb-rivalry-meta">${rivalry.total} play${rivalry.total !== 1 ? 's' : ''} in ${currentYear} · last ${_fmtDateShort(rivalry.lastDate)}</div>
    </div>` : '';

  const wireTabs = () => {
    container.querySelectorAll('[data-lb-mode]').forEach(el => {
      el.addEventListener('click', () => {
        const m = el.dataset.lbMode;
        if (m !== _leaderboardMode) {
          _leaderboardMode = m;
          showLeaderboardView();
        }
      });
    });
  };

  if (rows.length === 0) {
    container.innerHTML = `
      <div class="lb-header">
        <div class="lb-title">${titleTxt}</div>
      </div>
      ${tabsHtml}
      <div class="lb-empty">No active players to rank yet.</div>`;
    wireTabs();
    window.scrollTo(0, 0);
    return;
  }

  const podium = rows.slice(0, Math.min(3, rows.length));
  const rest = rows.slice(podium.length);
  const medals = ['🥇', '🥈', '🥉'];
  // Place 2nd on left, 1st in middle (tallest), 3rd on right
  const slotOrder = podium.length === 3 ? [1, 0, 2]
                   : podium.length === 2 ? [1, 0]
                   : [0];

  const podiumHtml = slotOrder.map(idx => {
    const p = podium[idx];
    if (!p) return '';
    const color = ratingColor(_eloToColorScore(p.elo));
    const initial = p.name.charAt(0).toUpperCase();
    const prov = p.provisional ? '<span class="lb-prov-badge">PROV</span>' : '';
    const streakHtml = p.streak >= 2 ? `<span class="lb-streak" title="${p.streak}-win streak">🔥 ${p.streak}</span>` : '';
    return `<div class="lb-podium-card rank-${idx + 1}" data-visit-player="${p.name.replace(/"/g, '&quot;')}">
      <div class="lb-podium-medal">${medals[idx]}</div>
      <div class="lb-podium-avatar">${initial}</div>
      <div class="lb-podium-name">${p.name}${prov}${streakHtml}</div>
      <div class="lb-podium-elo" style="color:${color}">${p.elo}</div>
      <div class="lb-podium-meta">${p.plays} play${p.plays !== 1 ? 's' : ''} · last ${_fmtDateShort(p.lastPlayed)}</div>
    </div>`;
  }).join('');

  const listHtml = rest.map((p, i) => {
    const rank = podium.length + i + 1;
    const color = ratingColor(_eloToColorScore(p.elo));
    const initial = p.name.charAt(0).toUpperCase();
    const deltaCls = p.lastDelta > 0 ? 'pos' : (p.lastDelta < 0 ? 'neg' : '');
    const deltaSign = p.lastDelta > 0 ? '+' : '';
    const deltaTxt = `${deltaSign}${p.lastDelta.toFixed(1)}`;
    const prov = p.provisional ? '<span class="lb-prov-badge">PROV</span>' : '';
    const streakHtml = p.streak >= 2 ? `<span class="lb-streak" title="${p.streak}-win streak">🔥 ${p.streak}</span>` : '';
    return `<div class="lb-row" data-visit-player="${p.name.replace(/"/g, '&quot;')}">
      <div class="lb-rank">${rank}</div>
      <div class="lb-avatar">${initial}</div>
      <div class="lb-name-block">
        <div class="lb-name">${p.name}${prov}</div>
        <div class="lb-sub"><span>${p.plays} play${p.plays !== 1 ? 's' : ''}</span>${streakHtml}</div>
      </div>
      <div class="lb-elo-block">
        <div class="lb-elo" style="color:${color}">${p.elo}</div>
        <div class="lb-delta ${deltaCls}">${deltaTxt}</div>
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `
    <div class="lb-header">
      <div class="lb-title">${titleTxt}</div>
      <div class="lb-count">${rows.length} player${rows.length !== 1 ? 's' : ''}</div>
    </div>
    ${tabsHtml}
    ${rivalryHtml}
    ${podium.length > 0 ? `<div class="lb-podium">${podiumHtml}</div>` : ''}
    <div class="lb-list">${listHtml}</div>
    <div class="lb-explain">
      ${isSouth ? '<b>Board South League:</b> A separate Elo using only plays where the location is "Board South". Independent of the main leaderboard.<br><br>' : ''}<b>How it works:</b> Everyone starts at 1000 on Jan 1. Each play of ${currentYear} replays in date order — winners gain, losers drop, with bigger swings when the underdog wins. Complexity scales points (a win on weight 5 = full value, lighter games = less). Losses scale down with player count, and finishing last costs more than finishing mid-pack. <b>PROV</b> means fewer than 5 plays this year (points move faster). The leaderboard resets every January 1st.
    </div>`;

  wireTabs();

  container.querySelectorAll('[data-visit-player]').forEach(el => {
    el.addEventListener('click', () => {
      showStatsView(el.dataset.visitPlayer, 'visiting');
      window.scrollTo(0, 0);
    });
  });

  window.scrollTo(0, 0);
}

      <div class="stats-player-avatar">${initial}</div>
      <div class="stats-player-info">

// ── Favorites System ──
let favoritesCache = {};
let favoritesCacheReady = false;

function _loadFavoritesFromLocal() {
  try {
    const raw = localStorage.getItem('bgl-favorites');
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}

function _saveFavoritesToLocal() {
  try { localStorage.setItem('bgl-favorites', JSON.stringify(favoritesCache)); } catch (e) {}
}

async function loadAllFavorites() {
  const local = _loadFavoritesFromLocal();
  favoritesCache = local;
  favoritesCacheReady = true;
  if (!FIREBASE_DB) return;
  try {
    const res = await fetch(`${FIREBASE_DB}/favorites.json`);
    const data = await res.json();
    if (data) {
      for (const key in data) {
        if (Array.isArray(data[key]) && data[key].length > 0) {
          favoritesCache[key] = data[key];
        }
      }
      _saveFavoritesToLocal();
    } else {
      const localKeys = Object.keys(local).filter(k => Array.isArray(local[k]) && local[k].length > 0);
      if (localKeys.length > 0) {
        await fetch(`${FIREBASE_DB}/favorites.json`, {
          method: 'PUT',
          body: JSON.stringify(local)
        });
      }
    }
  } catch (e) {
    console.warn('Failed to load favorites from Firebase:', e);
  }
}

function getPlayerFavorites(playerName) {
  return favoritesCache[playerName] || [];
}

async function saveFavorites(playerName, bggIds) {
  favoritesCache[playerName] = bggIds;
  _saveFavoritesToLocal();
  if (!FIREBASE_DB) return;
  try {
    await fetch(`${FIREBASE_DB}/favorites/${encodeURIComponent(playerName)}.json`, {
      method: 'PUT',
      body: JSON.stringify(bggIds)
    });
  } catch (e) {
    console.warn('Failed to save favorites to Firebase:', e);
  }
}

async function toggleFavorite(playerName, bggId) {
  const favs = getPlayerFavorites(playerName).slice();
  const idx = favs.indexOf(bggId);
  if (idx >= 0) {
    favs.splice(idx, 1);
  } else {
    if (favs.length >= 4) return false;
    favs.push(bggId);
  }
  await saveFavorites(playerName, favs);
  return true;
}

function isFavorited(playerName, bggId) {
  return getPlayerFavorites(playerName).includes(bggId);
}

function updateFavButton(bggId) {
  const btn = document.getElementById('modal-fav');
  if (!btn) return;
  const player = localStorage.getItem('bgl-player');
  if (!player || bggId <= 0) {
    btn.style.display = 'none';
    return;
  }
  btn.style.display = 'flex';
  const faved = isFavorited(player, bggId);
  const favs = getPlayerFavorites(player);
  const full = favs.length >= 4 && !faved;
  btn.classList.toggle('favorited', faved);
  btn.classList.toggle('full', full);
  btn.title = faved ? 'Remove from favorites' : (full ? 'Favorites full (4/4)' : 'Add to favorites');
  btn.dataset.bggId = bggId;
}

function wireFavButton() {
  const btn = document.getElementById('modal-fav');
  if (btn._wired) return;
  btn._wired = true;
  btn.addEventListener('click', async (e) => {
    e.stopPropagation();
    const player = localStorage.getItem('bgl-player');
    const bggId = Number(btn.dataset.bggId);
    if (!player || !bggId) return;
    if (btn.classList.contains('full') && !btn.classList.contains('favorited')) return;
    await toggleFavorite(player, bggId);
    updateFavButton(bggId);
  });
}

// When a local images/<bggId>.jpg is missing, fall back to the remote
// urlImage stored on the game (set by the importer for BGStats games),
// then to BGG's XML API as a last resort. BGG lookups are cached in
// localStorage so we only hit their API once per game per browser.
const BGG_IMG_CACHE_KEY = 'bgl-bgg-image-cache';
function _loadBggImageCache(){
  try { return JSON.parse(localStorage.getItem(BGG_IMG_CACHE_KEY) || '{}'); }
  catch(e) { return {}; }
}
function _saveBggImageCache(cache){
  try { localStorage.setItem(BGG_IMG_CACHE_KEY, JSON.stringify(cache)); } catch(e){}
}
const _bggImageInflight = {}; // bggId -> Promise (dedupe concurrent fetches)
async function _fetchBggImageUrl(bggId){
  const cache = _loadBggImageCache();
  if (cache[bggId]) return cache[bggId]; // only cache non-empty hits — retry empty/failures next visit
  if (_bggImageInflight[bggId]) return _bggImageInflight[bggId];
  _bggImageInflight[bggId] = (async () => {
    // BGG sometimes returns HTTP 202 with empty body on first hit; retry once.
    async function attempt() {
      try {
        const res = await fetch(`https://boardgamegeek.com/xmlapi2/thing?id=${bggId}`);
        if (res.status === 202) return null; // queued, retry
        const txt = await res.text();
        if (!txt) return null;
        const xml = new DOMParser().parseFromString(txt, 'text/xml');
        const img = xml.querySelector('image');
        const thumb = xml.querySelector('thumbnail');
        const url = (img && img.textContent.trim()) || (thumb && thumb.textContent.trim()) || '';
        return url || null;
      } catch (e) { return null; }
    }
    let url = await attempt();
    if (url == null) {
      await new Promise(r => setTimeout(r, 1500));
      url = await attempt();
    }
    if (url) {
      const c = _loadBggImageCache();
      c[bggId] = url;
      _saveBggImageCache(c);
    }
    delete _bggImageInflight[bggId];
    return url || '';
  })();
  return _bggImageInflight[bggId];
}
function _hideImgWithFallback(img){
  img.style.display = 'none';
  if (img.nextElementSibling && img.nextElementSibling.classList.contains('modal-cover-fallback')) {
    img.nextElementSibling.style.display = 'flex';
  }
}
window.__imgFallback = function(img, bggId){
  // Stage 0 → 1: local image failed. Try urlImage on the game.
  if (!img.dataset.fb) {
    img.dataset.fb = '1';
    const game = findGameByBggId(bggId);
    if (game && game.urlImage) { img.src = game.urlImage; return; }
    // No urlImage — go straight to BGG.
    img.dataset.fb = '2';
    _fetchBggImageUrl(bggId).then(url => {
      if (url) {
        if (game) game.urlImage = url; // cache on the game object too
        img.src = url;
      } else {
        _hideImgWithFallback(img);
      }
    });
    return;
  }
  // Stage 1 → 2: stored urlImage failed. Try BGG.
  if (img.dataset.fb === '1') {
    img.dataset.fb = '2';
    const game = findGameByBggId(bggId);
    _fetchBggImageUrl(bggId).then(url => {
      if (url) {
        if (game) game.urlImage = url;
        img.src = url;
      } else {
        _hideImgWithFallback(img);
      }
    });
    return;
  }
  // Stage 2: BGG image also failed to load — give up.
  _hideImgWithFallback(img);
};

function findGameByBggId(bggId) {
  const num = Number(bggId);
  return GAMES.find(g => g.bggId === num) || EXTRA_GAMES[bggId] || null;
}

function buildFavoritesHtml(playerName, isOwnProfile) {
  const favs = getPlayerFavorites(playerName);
  if (favs.length === 0 && !isOwnProfile) return '';

  let cards = '';
  for (let i = 0; i < 4; i++) {
    if (i < favs.length) {
      const game = findGameByBggId(favs[i]);
      const name = game ? game.name : 'Game #' + favs[i];
      const imgSrc = `images/${favs[i]}.jpg`;
      const removeBtn = isOwnProfile ? `<button class="fav-remove" data-fav-idx="${i}" title="Remove">&times;</button>` : '';
      cards += `<div class="fav-card" data-fav-bgg="${favs[i]}">
        ${removeBtn}
        <img src="${imgSrc}" alt="${name}" onerror="__imgFallback(this, ${favs[i]})">
        <div class="fav-card-name">${name}</div>
      </div>`;
    } else {
      cards += `<div class="fav-card fav-card-empty"><span>&#9733;</span></div>`;
    }
  }

  return `<div class="favorites-section">
    <div class="stats-section-title">Favorite Games</div>
    <div class="favorites-grid">${cards}</div>
  </div>`;
}

function wireFavoritesGrid(container, playerName, isOwnProfile) {
  container.querySelectorAll('.fav-card[data-fav-bgg]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.fav-remove')) return;
      const game = findGameByBggId(el.dataset.favBgg);
      if (game) openModal(game);
    });
  });
  container.querySelectorAll('.fav-remove').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const idx = Number(btn.dataset.favIdx);
      const favs = getPlayerFavorites(playerName).slice();
      favs.splice(idx, 1);
      await saveFavorites(playerName, favs);
      showStatsView(playerName);
    });
  });
  if (isOwnProfile) {
    container.querySelectorAll('.fav-card-empty').forEach(el => {
      el.addEventListener('click', () => openFavPicker(playerName));
    });
  }
}

function openFavPicker(playerName) {
  const existing = document.getElementById('fav-picker-overlay');
  if (existing) existing.remove();

  const currentFavs = getPlayerFavorites(playerName);
  const allGames = GAMES.slice().sort((a, b) => a.name.localeCompare(b.name));

  const overlay = document.createElement('div');
  overlay.id = 'fav-picker-overlay';
  overlay.className = 'fav-picker-overlay';
  overlay.innerHTML = `
    <div class="fav-picker-panel">
      <div class="fav-picker-head">
        <div class="fav-picker-title">Add a Favorite</div>
        <button class="fav-picker-close" aria-label="Close">&times;</button>
      </div>
      <input type="text" class="fav-picker-search" id="fav-picker-search" placeholder="Search games..." autocomplete="off">
      <div class="fav-picker-list" id="fav-picker-list"></div>
    </div>`;
  document.body.appendChild(overlay);

  const listEl = overlay.querySelector('#fav-picker-list');
  const searchEl = overlay.querySelector('#fav-picker-search');

  const render = (q) => {
    const term = (q || '').trim().toLowerCase();
    const matches = allGames
      .filter(g => !term || g.name.toLowerCase().includes(term))
      .slice(0, 200);
    listEl.innerHTML = matches.map(g => {
      const already = currentFavs.includes(g.bggId);
      const imgSrc = `images/${g.bggId}.jpg`;
      return `<div class="fav-picker-row${already ? ' already' : ''}" data-bgg="${g.bggId}">
        <img class="fav-picker-img" src="${imgSrc}" alt="" onerror="__imgFallback(this, ${g.bggId})">
        <div class="fav-picker-name">${g.name}${already ? ' <span class="fav-picker-tag">already a favorite</span>' : ''}</div>
      </div>`;
    }).join('') || '<div class="fav-picker-empty">No games match.</div>';
    listEl.querySelectorAll('.fav-picker-row').forEach(row => {
      row.addEventListener('click', async () => {
        if (row.classList.contains('already')) { close(); return; }
        const bggId = Number(row.dataset.bgg);
        const favs = getPlayerFavorites(playerName).slice();
        if (favs.length >= 4) return;
        favs.push(bggId);
        await saveFavorites(playerName, favs);
        close();
        showStatsView(playerName, _viewingProfile ? 'visiting' : undefined);
      });
    });
  };

  const close = () => overlay.remove();
  overlay.querySelector('.fav-picker-close').addEventListener('click', close);
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  searchEl.addEventListener('input', () => render(searchEl.value));
  render('');
  setTimeout(() => searchEl.focus(), 50);
}

// ── JSON Import ──
// ── BGStats Play File Importer ──
window.initImporter = function(){
  const dropZone  = document.getElementById('importDropZone');
  const fileInput = document.getElementById('importFileInput');
  const result    = document.getElementById('importResult');
  const resTitle  = document.getElementById('importResultTitle');
  const resLines  = document.getElementById('importResultLines');
  const imgDls    = document.getElementById('importImgDownloads');
  if(!dropZone || !fileInput) return;

  function showResult(type, title, lines){
    result.className = 'import-result ' + type;
    result.style.display = 'block';
    resTitle.textContent = title;
    resLines.innerHTML = lines.filter(Boolean).join('<br>');
    if(imgDls) imgDls.innerHTML = '';
  }

  async function fetchDescription(bggId){
    try{
      const res = await fetch(`https://boardgamegeek.com/xmlapi2/thing?id=${bggId}`);
      const txt = await res.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(txt, 'text/xml');
      const desc = xml.querySelector('description');
      if(!desc) return '';
      // decode HTML entities
      const ta = document.createElement('textarea');
      ta.innerHTML = desc.textContent;
      return ta.value.replace(/&#10;/g,'').trim().slice(0,600) + '…';
    } catch(e){ return ''; }
  }

  async function processImport(file){
    if(!file || !(/\.(json|bgsplay)$/i).test(file.name)){
      showResult('error','Invalid file',['Please select a .json or .bgsplay file exported from BGStats.']);
      return;
    }

    showResult('info','Reading file…',['Please wait…']);

    let data;
    try{
      const text = await file.text();
      data = JSON.parse(text);
    } catch(_){
      showResult('error','Parse error',['The file is not valid JSON.']);
      return;
    }

    // Validate it's a BGStats play file
    if(!data.plays || !data.games || !data.players){
      showResult('error','Wrong format',['This doesn\'t look like a BGStats Play export. Make sure you export using Share → Play File from BGStats.']);
      return;
    }

    // Build lookup maps from the imported file
    const importedGamesById  = {};  // id → game object
    const importedPlayersById = {}; // id → player object
    const importedLocationsById = {}; // id → location object
    data.games.forEach(g   => importedGamesById[g.id]   = g);
    data.players.forEach(p => importedPlayersById[p.id] = p);
    if (Array.isArray(data.locations)) {
      data.locations.forEach(l => importedLocationsById[l.id] = l);
    }

    // ── 1. Merge players ──
    // A player is "new" only if their mapped name doesn't already appear in PLAY_HISTORY
    const existingPlayerNames = new Set();
    for (const id in PLAY_HISTORY) {
      for (const play of PLAY_HISTORY[id]) {
        for (const s of play.sc) existingPlayerNames.add(s.n);
      }
    }
    let newPlayers = 0;
    data.players.forEach(p => {
      const mapped = NAME_MAP[p.name] || p.name;
      if(existingPlayerNames.has(mapped)) return;
      existingPlayerNames.add(mapped);
      newPlayers++;
    });

    // ── 2. Merge games → EXTRA_GAMES + PLAY_HISTORY images ──
    const existingBggIds = new Set(
      (window.GAMES || []).map(g => g.bggId).concat(
       Object.values(EXTRA_GAMES).map(g => g.bggId))
    );

    let newGames = 0;
    const descFetches = [];
    const gamePersists = [];

    data.games.forEach(g => {
      if(existingBggIds.has(g.bggId)) return;
      existingBggIds.add(g.bggId);
      newGames++;

      const entry = {
        id: 'imported_' + g.bggId,
        name: g.bggName || g.name,
        bggId: g.bggId,
        year: g.bggYear || null,
        designer: g.designers || '',
        players: (g.minPlayerCount && g.maxPlayerCount)
          ? (g.minPlayerCount === g.maxPlayerCount ? String(g.minPlayerCount) : `${g.minPlayerCount}-${g.maxPlayerCount}`)
          : '',
        playTime: (g.minPlayTime && g.maxPlayTime)
          ? (g.minPlayTime === g.maxPlayTime ? `${g.minPlayTime} min` : `${g.minPlayTime}-${g.maxPlayTime} min`)
          : '',
        categories: [],
        mechanics: [],
        description: '',
        bggRating: g.rating ? (g.rating / 10).toFixed(1) : null,
        urlImage: g.urlImage || g.urlThumb || null,
        imported: true,
      };

      // Queue description fetch
      descFetches.push(
        fetchDescription(g.bggId).then(desc => { entry.description = desc; })
      );

      EXTRA_GAMES[entry.bggId] = entry;
      gamePersists.push(persistImportedGame(entry));
    });

    // ── 3. Merge plays → PLAY_HISTORY ──
    let newPlays = 0, updatedPlays = 0, skipped = 0;
    const playPersists = [];

    data.plays.forEach(play => {
      const game = importedGamesById[play.gameRefId];
      if(!game || !game.bggId) return;
      const bggId = game.bggId;

      const dateStr = (play.playDate || play.entryDate || '').slice(0,10);

      const sc = (play.playerScores || []).map(ps => {
        const player = importedPlayersById[ps.playerRefId];
        let rawName = player ? player.name : ('Player ' + ps.playerRefId);
        const mappedName = NAME_MAP[rawName] || rawName;
        return {
          n: mappedName,
          s: ps.score !== null && ps.score !== undefined ? String(ps.score) : '',
          w: !!ps.winner,
          ...(ps.role ? {r: ps.role} : {}),
        };
      });

      const persistedEntry = { bggId, date: dateStr, sc };
      if(play.durationMin) persistedEntry.d = play.durationMin;
      if(play.board) persistedEntry.b = play.board;
      const locObj = play.locationRefId ? importedLocationsById[play.locationRefId] : null;
      const locName = locObj && locObj.name ? locObj.name : '';
      if (locName) persistedEntry.l = LOCATION_MAP[locName] || locName;

      const alreadyImported = !!importedPlaysCache[play.uuid];
      _mergePlayIntoHistory(play.uuid, persistedEntry);
      playPersists.push(persistImportedPlay(play.uuid, persistedEntry));
      if(alreadyImported) updatedPlays++; else newPlays++;
    });

    await Promise.all(descFetches);
    await Promise.all(gamePersists);
    await Promise.all(playPersists);

    // Re-render if stats view is open
    if(typeof showStatsView === 'function' && window.currentStatsPlayer){
      showStatsView(window.currentStatsPlayer);
    }

    if(newPlays === 0 && newGames === 0 && newPlayers === 0){
      showResult('info','Nothing new',['All entries in this file already exist.', skipped ? `${skipped} duplicate(s) skipped.` : '']);
      return;
    }

    showResult('success','Import successful ✓',[
      newPlays    ? `+${newPlays} new play${newPlays!==1?'s':''}` : '',
      updatedPlays ? `✏️ ${updatedPlays} play${updatedPlays!==1?'s':''} updated` : '',
      newGames    ? `+${newGames} new game${newGames!==1?'s':''}` : '',
      newPlayers  ? `+${newPlayers} new player${newPlayers!==1?'s':''}` : '',
      skipped     ? `${skipped} duplicate${skipped!==1?'s':''} skipped` : '',
    ]);

    const lbView = document.getElementById('leaderboard-view');
    if (lbView && lbView.classList.contains('open')) {
      try { showLeaderboardView(); } catch (_) {}
    }

    fileInput.value = '';
  }

  fileInput.addEventListener('change', e => processImport(e.target.files[0]));
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    processImport(e.dataTransfer.files[0]);
  });
};
