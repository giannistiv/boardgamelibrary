<title>Board Game Library</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --wood:#c9a66b;--wood-dark:#a07840;--wood-light:#dfc89a;--wood-shadow:#7a5a30;
    --bg:#1a1a2e;--text:#f0e6d3;--accent:#e2b04a;--modal-bg:#2a2a3e;
  }
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
  }
  h1{
    font-size:2.2rem;margin:1.5rem 0 0.3rem;text-align:center;
    font-weight:300;letter-spacing:0.05em;color:var(--accent);
  }
  .subtitle{font-size:0.85rem;opacity:0.5;margin-bottom:1.2rem;text-align:center}

  /* ── Filters ── */
  .filters{
    display:flex;flex-wrap:wrap;justify-content:center;gap:0.45rem;
    padding:0 1rem 1.2rem;max-width:1000px;
  }
  .filter-btn{
    padding:0.35rem 0.9rem;border-radius:20px;border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.05);color:var(--text);cursor:pointer;
    font-size:0.78rem;transition:all 0.3s;user-select:none;
  }
  .filter-btn:hover{background:rgba(255,255,255,0.12)}
  .filter-btn.active{background:var(--accent);color:#1a1a2e;border-color:var(--accent);font-weight:600}

  /* ── Shelf ── */
  .shelf-wrapper{
    padding:0 0.5rem 2rem;width:100%;max-width:1200px;overflow-x:auto;
  }
  .shelf{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:0;
    background:var(--wood);
    border:6px solid var(--wood-dark);
    border-radius:4px;
    box-shadow:0 8px 40px rgba(0,0,0,0.5),inset 0 0 20px rgba(0,0,0,0.15);
    min-width:850px;
  }
  .cubby{
    border:3px solid var(--wood-dark);
    background:linear-gradient(180deg,#3a3020 0%,#2a2218 60%,#1e1810 100%);
    min-height:85px;padding:5px 4px 3px;
    display:flex;align-items:stretch;gap:2px;
    position:relative;overflow:hidden;
    box-shadow:inset 0 3px 8px rgba(0,0,0,0.5),inset 0 -1px 3px rgba(0,0,0,0.3);
  }
  .cubby.tall{grid-row:span 2;min-height:175px}
  .cubby.filler-cubby{
    justify-content:center;align-items:center;
    opacity:0.15;font-size:0.65rem;font-style:italic;letter-spacing:0.05em;
  }

  /* ── Game spines ── */
  .game-spine{
    flex-shrink:0;flex-grow:1;
    border-radius:2px 2px 0 0;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    position:relative;transition:all 0.4s ease;
    box-shadow:1px 0 3px rgba(0,0,0,0.4),-1px 0 2px rgba(0,0,0,0.2);
    overflow:hidden;
  }
  .game-spine .spine-text{
    writing-mode:vertical-rl;text-orientation:mixed;
    font-size:0.55rem;font-weight:600;letter-spacing:0.03em;
    color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.7);
    padding:4px 1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    max-height:100%;
  }
  .game-spine.box-lg .spine-text{font-size:0.65rem}
  .game-spine.box-xl .spine-text{font-size:0.7rem}
  .game-spine:hover{
    transform:translateY(-4px) scale(1.04);
    box-shadow:0 4px 15px rgba(226,176,74,0.4),1px 0 3px rgba(0,0,0,0.4);
    z-index:5;
  }
  .game-spine.faded{
    opacity:0.1 !important;filter:grayscale(1);pointer-events:none;
    transform:none !important;box-shadow:1px 0 3px rgba(0,0,0,0.2) !important;
  }

  /* Box sizes - flex-grow proportional, min-width as floor */
  .game-spine.box-sm{flex:18 0 18px;min-width:18px}
  .game-spine.box-md{flex:28 0 22px;min-width:22px}
  .game-spine.box-lg{flex:40 0 30px;min-width:30px}
  .game-spine.box-xl{flex:55 0 40px;min-width:40px}
  .game-spine.box-flat{flex:12 0 12px;min-width:12px}

  /* Horizontal layout for cubbies with 1-2 games */
  .cubby.horizontal-layout{
    flex-direction:column;justify-content:flex-end;align-items:stretch;
  }
  .cubby.horizontal-layout .game-spine{
    flex:0 0 auto !important;width:100%;min-width:unset !important;
  }
  .cubby.horizontal-layout .game-spine.box-sm{height:22px}
  .cubby.horizontal-layout .game-spine.box-md{height:30px}
  .cubby.horizontal-layout .game-spine.box-lg{height:45px}
  .cubby.horizontal-layout .game-spine.box-xl{height:60px}
  .cubby.horizontal-layout .game-spine .spine-text{
    writing-mode:horizontal-tb;text-orientation:initial;
    font-size:0.6rem;padding:2px 8px;
    max-height:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    max-width:100%;
  }
  .cubby.horizontal-layout .game-spine.box-lg .spine-text,
  .cubby.horizontal-layout .game-spine.box-xl .spine-text{font-size:0.7rem}

  /* ── Modal ── */
  .modal-overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);
    z-index:100;justify-content:center;align-items:center;padding:1rem;
    backdrop-filter:blur(6px);
  }
  .modal-overlay.open{display:flex}
  .modal{
    background:var(--modal-bg);border-radius:16px;max-width:520px;width:100%;
    max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.5);
    position:relative;
  }
  .modal-close{
    position:absolute;top:12px;right:14px;background:rgba(0,0,0,0.5);border:none;
    color:#fff;font-size:1.3rem;cursor:pointer;opacity:0.8;
    z-index:2;line-height:1;width:32px;height:32px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
  }
  .modal-close:hover{opacity:1;background:rgba(0,0,0,0.7)}

  /* Modal cover image */
  .modal-cover{
    width:100%;border-radius:16px 16px 0 0;
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    background:#1a1a28;
  }
  .modal-cover-img{
    display:block;width:100%;height:auto;
    transition:opacity 0.3s;
  }
  .modal-cover-fallback{
    width:100%;height:200px;display:flex;align-items:center;justify-content:center;
    font-size:1.5rem;font-weight:700;
    color:rgba(255,255,255,0.85);text-shadow:0 2px 8px rgba(0,0,0,0.5);
    text-align:center;padding:1rem;letter-spacing:0.02em;
    background-size:cover;background-position:center;
  }

  .modal-body{padding:1.5rem}

  /* Title + year row */
  .modal-header{display:flex;align-items:baseline;gap:0.6rem;margin-bottom:0.3rem;flex-wrap:wrap}
  .modal-title{font-size:1.4rem;font-weight:700;color:var(--accent)}
  .modal-year{font-size:0.85rem;opacity:0.5;font-weight:400}

  /* Designer */
  .modal-designer{font-size:0.8rem;opacity:0.55;margin-bottom:0.8rem;font-style:italic}

  /* Rating bar */
  .modal-rating-row{
    display:flex;align-items:center;gap:0.7rem;margin-bottom:1rem;
    padding:0.6rem 0.8rem;border-radius:10px;background:rgba(255,255,255,0.04);
  }
  .rating-badge{
    font-size:1.3rem;font-weight:800;min-width:2.5rem;text-align:center;
  }
  .rating-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
  .rating-bar{height:100%;border-radius:3px;transition:width 0.4s ease}
  .rating-label{font-size:0.7rem;opacity:0.45;white-space:nowrap}

  /* Stats row */
  .modal-stats{
    display:flex;flex-wrap:wrap;gap:0.7rem;margin-bottom:1rem;font-size:0.82rem;opacity:0.8;
  }
  .modal-stat{display:flex;align-items:center;gap:0.3rem}
  .modal-stat .icon{font-size:1rem;opacity:0.6}

  /* Category + mechanic tags */
  .modal-categories{display:flex;flex-wrap:wrap;gap:0.35rem;margin-bottom:0.6rem}
  .modal-cat{
    padding:0.2rem 0.6rem;border-radius:12px;font-size:0.7rem;
    background:rgba(226,176,74,0.15);color:var(--accent);
  }
  .modal-mechanics{display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:1rem}
  .modal-mech{
    padding:0.15rem 0.55rem;border-radius:10px;font-size:0.65rem;
    background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.55);
    border:1px solid rgba(255,255,255,0.08);
  }

  .modal-desc{font-size:0.85rem;line-height:1.6;opacity:0.75;margin-bottom:1.2rem}
  .modal-bgg-link{
    display:inline-block;padding:0.5rem 1.2rem;border-radius:8px;
    background:var(--accent);color:#1a1a2e;text-decoration:none;
    font-weight:600;font-size:0.85rem;transition:opacity 0.2s;
  }
  .modal-bgg-link:hover{opacity:0.85}

  /* ── Responsive ── */
  @media(max-width:900px){
    h1{font-size:1.5rem}
    .game-spine.box-xl{flex-basis:32px;min-width:32px}
    .game-spine.box-lg{flex-basis:24px;min-width:24px}
    .game-spine.box-md{flex-basis:18px;min-width:18px}
    .game-spine.box-sm{flex-basis:14px;min-width:14px}
    .game-spine .spine-text{font-size:0.45rem}
    .modal-cover-img{max-height:50vh}
    .cubby.horizontal-layout .game-spine.box-sm{height:18px}
    .cubby.horizontal-layout .game-spine.box-md{height:24px}
    .cubby.horizontal-layout .game-spine.box-lg{height:35px}
    .cubby.horizontal-layout .game-spine.box-xl{height:48px}
  }
</style>
</head>

// Cubby configuration
const CUBBY_CONFIG = {
  "1-5": {tall:true},
  "3-1": {tall:true},
  "4-3": {tall:true},
  "2-5": {skip:true},
  "4-1": {skip:true},
  "5-3": {skip:true},
  "2-4": {filler:"Comics"},
  "2-6": {filler:"Comics"},
  "3-2": {filler:"Comics"},
  "4-5": {filler:"Comics"},
  "5-2": {filler:"Books"},
  "5-4": {filler:"Books"},
};

const CATEGORIES = [
  "Strategy","Co-op","Euro","Thematic","Family","Campaign",
  "Deck Building","Worker Placement","Engine Building",
  "Card Game","Deduction","Area Control","Dice",
  "Solo","Puzzle","Party","Abstract","Adventure","Racing"
];

// ── Render filters ──
function renderFilters() {
  const el = document.getElementById('filters');
  const usedCats = new Set();
  GAMES.forEach(g => g.categories.forEach(c => usedCats.add(c)));
  const cats = CATEGORIES.filter(c => usedCats.has(c));

  el.innerHTML = cats.map(cat =>
    `<button class="filter-btn" data-cat="${cat}">${cat}</button>`
  ).join('') + `<button class="filter-btn" data-cat="__all" style="border-color:var(--accent)">Show All</button>`;

  el.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    const cat = btn.dataset.cat;
    if (cat === '__all') {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      applyFilter(null);
      return;
    }
    btn.classList.toggle('active');
    el.querySelector('[data-cat="__all"]')?.classList.remove('active');
    const activeCats = [...el.querySelectorAll('.filter-btn.active')].map(b => b.dataset.cat);
    applyFilter(activeCats.length ? activeCats : null);
  });
}

function applyFilter(activeCats) {
  document.querySelectorAll('.game-spine').forEach(el => {
    if (!activeCats) { el.classList.remove('faded'); return; }
    const gameId = el.dataset.gameId;
    const game = GAMES.find(g => g.id === gameId);
    if (!game) { el.classList.add('faded'); return; }
    const matches = activeCats.every(cat => game.categories.includes(cat));
    el.classList.toggle('faded', !matches);
  });
}

// ── Render shelf ──
function renderShelf() {
  const shelfEl = document.getElementById('shelf');
  shelfEl.innerHTML = '';

  for (let row = 1; row <= 6; row++) {
    for (let col = 1; col <= 6; col++) {
      const key = `${row}-${col}`;
      const cfg = CUBBY_CONFIG[key] || {};

      if (cfg.skip) continue;

      const cubby = document.createElement('div');
      cubby.className = 'cubby';
      if (cfg.tall) cubby.classList.add('tall');

      if (cfg.filler) {
        cubby.classList.add('filler-cubby');
        cubby.textContent = cfg.filler;
        shelfEl.appendChild(cubby);
        continue;
      }

      let cubbyGames = GAMES.filter(g => g.row === row && g.col === col);
      if (cfg.tall) {
        const nextRowGames = GAMES.filter(g => g.row === row + 1 && g.col === col);
        cubbyGames = [...cubbyGames, ...nextRowGames];
      }

      if (cubbyGames.length <= 2) {
        cubby.classList.add('horizontal-layout');
      }

      cubbyGames.forEach(game => {
        const spine = document.createElement('div');
        spine.className = `game-spine box-${game.boxSize}`;
        spine.style.background = game.spineColor;
        spine.dataset.gameId = game.id;
        spine.title = game.name;

        const text = document.createElement('span');
        text.className = 'spine-text';
        text.textContent = game.name;
        spine.appendChild(text);

        spine.addEventListener('click', () => openModal(game));
        cubby.appendChild(spine);
      });

      shelfEl.appendChild(cubby);
    }
  }
}

// ── Modal ──
function openModal(game) {
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');

  const c = game.spineColor;
  const fallbackBg = `linear-gradient(135deg, ${c}, ${adjustColor(c, -30)})`;

  // Build cover image section
  let coverHtml;
  if (game.bggId > 0) {
    coverHtml = `
      <div class="modal-cover">
        <img class="modal-cover-img"
             src="images/${game.bggId}.jpg"
             alt="${game.name}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="modal-cover-fallback" style="display:none;background:${fallbackBg}">${game.name}</div>
      </div>`;
  } else {
    coverHtml = `<div class="modal-cover"><div class="modal-cover-fallback" style="background:${fallbackBg}">${game.name}</div></div>`;
  }

  // Rating section with dynamic color
  let ratingHtml = '';
  if (game.bggRating) {
    const pct = ((game.bggRating / 10) * 100).toFixed(0);
    const rColor = ratingColor(game.bggRating);
    ratingHtml = `
      <div class="modal-rating-row">
        <span class="rating-badge" style="color:${rColor}">${game.bggRating}</span>
        <div class="rating-bar-wrap"><div class="rating-bar" style="width:${pct}%;background:${rColor}"></div></div>
        <span class="rating-label">BGG Rating</span>
      </div>`;
  }

  // Mechanics
  let mechanicsHtml = '';
  if (game.mechanics && game.mechanics.length) {
    mechanicsHtml = `<div class="modal-mechanics">${game.mechanics.map(m => `<span class="modal-mech">${m}</span>`).join('')}</div>`;
  }

  content.innerHTML = `
    ${coverHtml}
    <div class="modal-body">
      <div class="modal-header">
        <span class="modal-title">${game.name}</span>
        ${game.year ? `<span class="modal-year">(${game.year})</span>` : ''}
      </div>
      ${game.designer ? `<div class="modal-designer">Designed by ${game.designer}</div>` : ''}
      ${ratingHtml}
      <div class="modal-stats">
        <span class="modal-stat"><span class="icon">&#128101;</span> ${game.players} players</span>
        <span class="modal-stat"><span class="icon">&#9201;</span> ${game.playTime}</span>
        ${game.complexity > 0 ? `<span class="modal-stat"><span class="icon">&#9878;&#65039;</span> ${game.complexity}/5 weight</span>` : ''}
      </div>
      <div class="modal-categories">
        ${game.categories.map(c => `<span class="modal-cat">${c}</span>`).join('')}
      </div>
      ${mechanicsHtml}
      <div class="modal-desc">${game.description}</div>
      ${game.bggId > 0
        ? `<a class="modal-bgg-link" href="https://boardgamegeek.com/boardgame/${game.bggId}" target="_blank" rel="noopener">View on BoardGameGeek &#8594;</a>`
        : `<a class="modal-bgg-link" href="https://boardgamegeek.com/geeksearch.php?action=search&objecttype=boardgame&q=${encodeURIComponent(game.name)}" target="_blank" rel="noopener">Search on BoardGameGeek &#8594;</a>`
      }
    </div>
  `;
  overlay.classList.add('open');
}

function adjustColor(hex, amount) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0,Math.min(255,r+amount));
  g = Math.max(0,Math.min(255,g+amount));
  b = Math.max(0,Math.min(255,b+amount));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function ratingColor(rating) {
  if (rating >= 8.5) return '#22c55e';  // Emerald green - outstanding
  if (rating >= 8.0) return '#4ade80';  // Green - excellent
  if (rating >= 7.5) return '#a3e635';  // Lime - very good
  if (rating >= 7.0) return '#e2b04a';  // Amber/gold - good
  if (rating >= 6.5) return '#f59e0b';  // Orange - decent
  if (rating >= 6.0) return '#f97316';  // Deep orange - fair
  return '#ef4444';                      // Red - below average
}

// Close modal
document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('open');
});

// ── Init ──
renderFilters();
renderShelf();
</script>
